<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ossy ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        text-align: center;
        color: white;
    }

    .container {
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.5em;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 1.2em;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff6b81;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff6b81;
        color: white;
    }

    #surprise {
        margin-top: 20px;
        font-size: 1.8em;
        display: none;
        animation: pop 1s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @keyframes pop {
        from {transform: scale(0);}
        to {transform: scale(1);}
    }

    .heart {
        position: absolute;
        color: white;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday Ossy ❤️</h1>
    <p>You make every day brighter 🌟</p>
    <button onclick="showSurprise()">Click for a Surprise 🎁</button>
    <div id="surprise">I hope your day is full of love, laughter, and happiness 💖</div>
</div>

<script>
function showSurprise() {
    document.getElementById("surprise").style.display = "block";
}

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
